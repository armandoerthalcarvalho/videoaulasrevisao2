<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Revisão de Química: Estrutura Atômica, Íons, Massa Atômica e Semelhanças Atômicas</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui}canvas{border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.5);max-width:90vw}.controls{display:flex;gap:10px;margin-top:16px;align-items:center}.controls button{padding:8px 16px;border:1px solid #333;border-radius:8px;background:#16213e;color:#fff;cursor:pointer;font-size:14px}.controls button:hover{border-color:#667eea}.progress{width:300px;height:6px;background:#333;border-radius:3px;cursor:pointer;position:relative;margin:0 10px}.progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:3px;width:0%}.time{color:#888;font-size:12px}.title{color:#fff;font-size:20px;margin-bottom:16px;font-weight:600}</style></head><body><div class="title">🎬 Revisão de Química: Estrutura Atômica, Íons, Massa Atômica e Semelhanças Atômicas</div><canvas id="c" width="960" height="540"></canvas><div class="controls"><button onclick="play()" id="pb">▶️</button><button onclick="stop()">⏹</button><div class="progress" onclick="seek(event)"><div class="progress-fill" id="pf"></div></div><span class="time" id="tm">0:00</span></div><script>const slides=[{"elements":[{"id":"el_t_0","type":"text","content":"Introdução","x":100,"y":80,"w":760,"h":50,"fontSize":32,"fontFamily":"sans-serif","color":"#ffffff","fontWeight":"bold","textAlign":"center","opacity":100},{"id":"el_c_0","type":"text","content":"Bem-vindos à revisão de Química! Neste vídeo, vamos abordar os tópicos de Estrutura Atômica, Íons, Massa Atômica e Semelhanças Atômicas","x":60,"y":180,"w":840,"h":280,"fontSize":18,"fontFamily":"sans-serif","color":"#e8e8e8","fontWeight":"normal","textAlign":"left","opacity":100}],"script":"Bem-vindos à revisão de Química! Neste vídeo, vamos abordar os tópicos de Estrutura Atômica, Íons, Massa Atômica e Semelhanças Atômicas. É fundamental entender esses conceitos para ter sucesso na prova de Química","duration":10,"background":"#3498db"},{"elements":[{"id":"el_t_1","type":"text","content":"Estrutura Atômica","x":100,"y":80,"w":760,"h":50,"fontSize":32,"fontFamily":"sans-serif","color":"#ffffff","fontWeight":"bold","textAlign":"center","opacity":100},{"id":"el_c_1","type":"text","content":"A estrutura atômica refere-se à organização das partículas fundamentais que compõem um átomo, incluindo prótons, nêutrons e elétrons","x":60,"y":180,"w":840,"h":280,"fontSize":18,"fontFamily":"sans-serif","color":"#e8e8e8","fontWeight":"normal","textAlign":"left","opacity":100}],"script":"A estrutura atômica é como um sistema solar, com o núcleo no centro e os elétrons orbitando em torno. O número atômico é igual ao número de prótons no núcleo","duration":15,"background":"#f1c40f"},{"elements":[{"id":"el_t_2","type":"text","content":"Distribuição Eletrônica","x":100,"y":80,"w":760,"h":50,"fontSize":32,"fontFamily":"sans-serif","color":"#ffffff","fontWeight":"bold","textAlign":"center","opacity":100},{"id":"el_c_2","type":"text","content":"A distribuição eletrônica é a capacidade máxima de elétrons nas camadas que ficam ao entorno do núcleo do átomo","x":60,"y":180,"w":840,"h":280,"fontSize":18,"fontFamily":"sans-serif","color":"#e8e8e8","fontWeight":"normal","textAlign":"left","opacity":100}],"script":"A distribuição eletrônica segue a regra do octeto, onde os átomos tentam ter exatamente 8 elétrons na sua camada valente para atingir estabilidade. Existem exceções, como o hidrogênio","duration":12,"background":"#2ecc71"},{"elements":[{"id":"el_t_3","type":"text","content":"Íons","x":100,"y":80,"w":760,"h":50,"fontSize":32,"fontFamily":"sans-serif","color":"#ffffff","fontWeight":"bold","textAlign":"center","opacity":100},{"id":"el_c_3","type":"text","content":"Íons são átomos que perderam ou ganharam elétrons, resultando em uma carga elétrica","x":60,"y":180,"w":840,"h":280,"fontSize":18,"fontFamily":"sans-serif","color":"#e8e8e8","fontWeight":"normal","textAlign":"left","opacity":100}],"script":"Íons são como átomos que perderam ou ganharam bolas de futebol. O número de prótons nunca muda, apenas o número de elétrons. Cuidado com a confusão entre íons e isótopos!","duration":10,"background":"#e74c3c"},{"elements":[{"id":"el_t_4","type":"text","content":"Massa Atômica","x":100,"y":80,"w":760,"h":50,"fontSize":32,"fontFamily":"sans-serif","color":"#ffffff","fontWeight":"bold","textAlign":"center","opacity":100},{"id":"el_c_4","type":"text","content":"A massa atômica é a média ponderada das massas dos isótopos de um elemento","x":60,"y":180,"w":840,"h":280,"fontSize":18,"fontFamily":"sans-serif","color":"#e8e8e8","fontWeight":"normal","textAlign":"left","opacity":100}],"script":"A massa atômica é como a média de alturas de uma turma de alunos. A unidade de massa atômica é u, e é fundamental lembrar que a massa atômica é calculada com base na abundância isotópica","duration":12,"background":"#9b59b6"},{"elements":[{"id":"el_t_5","type":"text","content":"Semelhanças Atômicas","x":100,"y":80,"w":760,"h":50,"fontSize":32,"fontFamily":"sans-serif","color":"#ffffff","fontWeight":"bold","textAlign":"center","opacity":100},{"id":"el_c_5","type":"text","content":"As semelhanças atômicas referem-se às relações entre átomos com propriedades semelhantes","x":60,"y":180,"w":840,"h":280,"fontSize":18,"fontFamily":"sans-serif","color":"#e8e8e8","fontWeight":"normal","textAlign":"left","opacity":100}],"script":"As semelhanças atômicas são como as relações entre primos, com semelhanças e diferenças. Isótopos têm o mesmo Z, mas diferente A, e isóbaros têm o mesmo A, mas diferente Z","duration":12,"background":"#1abc9c"},{"elements":[{"id":"el_t_6","type":"text","content":"Conclusão","x":100,"y":80,"w":760,"h":50,"fontSize":32,"fontFamily":"sans-serif","color":"#ffffff","fontWeight":"bold","textAlign":"center","opacity":100},{"id":"el_c_6","type":"text","content":"Este guia oferece uma revisão completa e detalhada dos tópicos de Estrutura Atômica, Íons, Massa Atômica e Semelhanças Atômicas","x":60,"y":180,"w":840,"h":280,"fontSize":18,"fontFamily":"sans-serif","color":"#e8e8e8","fontWeight":"normal","textAlign":"left","opacity":100}],"script":"Agora que você concluiu esta revisão, lembre-se de que a prática e a revisão são fundamentais para o sucesso! Continue estudando e você estará bem preparado para a prova de Química","duration":10,"background":"#3498db"}];const rate=1;let idx=0,playing=false,utt=null,timer=null;const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');function parseBg(bg){if(!bg)return'#1a1a2e';const lg=bg.match(/linear-gradient\(([^)]+)\)/);if(!lg)return bg;const pts=lg[1].split(/,(?![^(]*\))/).map(s=>s.trim());const ang=parseFloat(pts[0])||135;const stops=pts.slice(1).map((p,i,a)=>{const m=p.match(/(#[0-9a-fA-F]{3,8}|rgba?\([^)]+\)|[a-z]+)\s*([\d.]+%)?/);return m?{c:m[1],t:m[2]?parseFloat(m[2])/100:i/Math.max(a.length-1,1)}:null}).filter(Boolean);if(stops.length<2)return stops[0]?.c||'#1a1a2e';const r=(ang-90)*Math.PI/180,cx=480,cy=270,dx=Math.abs(Math.cos(r))*480+Math.abs(Math.sin(r))*270;const g=ctx.createLinearGradient(cx-Math.cos(r)*dx,cy-Math.sin(r)*dx,cx+Math.cos(r)*dx,cy+Math.sin(r)*dx);stops.forEach(s=>g.addColorStop(Math.min(1,Math.max(0,s.t)),s.c));return g;}function render(i){const s=slides[i];if(!s)return;ctx.fillStyle=parseBg(s.background||'#1a1a2e');ctx.fillRect(0,0,960,540);(s.elements||[]).forEach(el=>{if(el.type==='text'){ctx.save();ctx.globalAlpha=(el.opacity||100)/100;ctx.fillStyle=el.color||'#fff';ctx.font=(el.fontWeight==='bold'?'bold ':'')+((el.fontSize||16))+'px '+(el.fontFamily||'sans-serif');ctx.textAlign=el.textAlign||'left';const x=el.textAlign==='center'?el.x+(el.w||200)/2:(el.textAlign==='right'?el.x+(el.w||200):el.x);const elW=el.w||800,lineH=(el.fontSize||16)*1.3;let li=0;(el.content||'').split('\n').forEach(raw=>{const ws=raw.split(' ');let cur='';ws.forEach(w=>{const t=cur?cur+' '+w:w;if(ctx.measureText(t).width>elW&&cur){ctx.fillText(cur,x,el.y+(el.fontSize||16)+li*lineH);li++;cur=w;}else{cur=t;}});ctx.fillText(cur,x,el.y+(el.fontSize||16)+li*lineH);li++;});ctx.restore()}else if(el.type==='shape'){ctx.save();ctx.globalAlpha=(el.opacity||100)/100;ctx.fillStyle=el.fill||el.color||'#667eea';ctx.fillRect(el.x,el.y,el.w||100,el.h||100);ctx.restore()}else if(el.type==='icon'){ctx.save();ctx.globalAlpha=(el.opacity||100)/100;ctx.font=(el.fontSize||48)+'px serif';ctx.textAlign='left';ctx.fillText(el.content||'',el.x,el.y+(el.fontSize||48));ctx.restore()}else if(el.type==='image'&&el.src){const img=new Image();img.crossOrigin='anonymous';img.onload=()=>{ctx.save();ctx.globalAlpha=(el.opacity||100)/100;ctx.drawImage(img,el.x,el.y,el.w||200,el.h||150);ctx.restore()};img.src=el.src}})}function upd(){const total=slides.reduce((s,sl)=>s+sl.duration,0);const cur=slides.slice(0,idx).reduce((s,sl)=>s+sl.duration,0);document.getElementById('pf').style.width=(cur/total*100)+'%';const m=Math.floor(cur/60),sec=cur%60;document.getElementById('tm').textContent=m+':'+(sec<10?'0':'')+sec}function playSlide(i){if(!playing||i>=slides.length){stop();return}idx=i;render(i);upd();const sc=(slides[i].script||'').trim();if(sc){speechSynthesis.cancel();utt=new SpeechSynthesisUtterance(sc);utt.rate=rate;utt.onend=()=>playSlide(i+1);speechSynthesis.speak(utt)}else{timer=setTimeout(()=>playSlide(i+1),(slides[i].duration||5)*1000)}}function play(){if(playing){speechSynthesis.cancel();if(timer)clearTimeout(timer);timer=null;playing=false;document.getElementById('pb').textContent='▶️';return;}playing=true;document.getElementById('pb').textContent='⏸';playSlide(idx)}function stop(){speechSynthesis.cancel();if(timer)clearTimeout(timer);playing=false;document.getElementById('pb').textContent='▶️'}function seek(e){const p=(e.clientX-e.currentTarget.getBoundingClientRect().left)/e.currentTarget.offsetWidth;const total=slides.reduce((s,sl)=>s+sl.duration,0);let t=p*total,c=0;for(let i=0;i<slides.length;i++){c+=slides[i].duration;if(c>t){idx=i;render(i);upd();break}}}render(0);upd()</script><div style="position:fixed;top:10px;left:12px;color:rgba(255,255,255,0.55);font-size:12px;font-family:system-ui,-apple-system,sans-serif;pointer-events:none;z-index:9999;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,0.7)">🍣 Feito com Teriaki</div><div style="position:fixed;top:10px;right:12px;color:rgba(255,255,255,0.55);font-size:12px;font-family:system-ui,-apple-system,sans-serif;pointer-events:none;z-index:9999;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,0.7)">🍣 Feito com Teriaki</div><div style="position:fixed;bottom:10px;left:12px;color:rgba(255,255,255,0.55);font-size:12px;font-family:system-ui,-apple-system,sans-serif;pointer-events:none;z-index:9999;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,0.7)">🍣 Feito com Teriaki</div><div style="position:fixed;bottom:10px;right:12px;color:rgba(255,255,255,0.55);font-size:12px;font-family:system-ui,-apple-system,sans-serif;pointer-events:none;z-index:9999;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,0.7)">🍣 Feito com Teriaki</div></body></html>
